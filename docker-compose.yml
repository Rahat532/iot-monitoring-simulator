version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iiot}
      POSTGRES_USER: ${POSTGRES_USER:-iiot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iiot}
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iiot} -d ${POSTGRES_DB:-iiot}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./iiot-monitoring-simmk/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./iiot-monitoring-simmk
      dockerfile: backend/Dockerfile
    container_name: iiot-backend
    environment:
      APP_NAME: ${APP_NAME:-IIoT Monitoring Backend}
      APP_VERSION: ${APP_VERSION:-0.2.0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-iiot}:${POSTGRES_PASSWORD:-iiot}@timescaledb:5432/${POSTGRES_DB:-iiot}
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_CLIENT_ID: iiot-backend
      MQTT_TELEMETRY_TOPIC: iiot/+/telemetry
      MQTT_STATUS_TOPIC: iiot/+/status
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  simulator:
    build:
      context: ./iiot-monitoring-simmk
      dockerfile: simulator/Dockerfile
    container_name: iiot-simulator
    environment:
      BACKEND_URL: http://backend:8000/v1/telemetry
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      HTTP_FALLBACK: true
      DEVICE_IDS: ${DEVICE_IDS:-device-001,device-002,device-003}
      SIM_SAMPLE_RATE: ${SIM_SAMPLE_RATE:-1.0}
      FAULT_MODE: ${FAULT_MODE:-none}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: ./iiot-monitoring-simmk
      dockerfile: dashboard/Dockerfile
    container_name: iiot-dashboard
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: iiot-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: iiot-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 8
    restart: unless-stopped

volumes:
  tsdb_data: